<!DOCTYPE html>
<html>
<head>
    <title>XYRON Blockchain</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
        }
        h1 { font-size: 3em; margin-bottom: 20px; }
        .status {
            font-size: 1.5em;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 20px 0;
        }
        .pip { color: #4CAF50; font-weight: bold; }
        .links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 XYRON BLOCKCHAIN</h1>
        <div class="status">
            Status: <span class="pip">PIP</span> (Active)
        </div>
        <p>Blockchain Engine: ✅ Running</p>
        <p>Rust Core: ✅ Active</p>
        <p>Go Stream: ✅ Connected</p>
        <div class="links">
            <a href="/health">🔍 Health</a>
            <a href="/blocks">📦 Blocks</a>
            <a href="/stats">📊 Stats</a>
        </div>
    </div>
</body>
</html>
